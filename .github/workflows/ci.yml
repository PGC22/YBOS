name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test_l0:
    name: Build & Test l0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        # protoc is provided at build time by protoc-bin-vendored (build-dep),
        # so no system protoc install is needed here.
        working-directory: l0
        run: cargo test

  cross_compile_android:
    name: Cross-compile l0 for Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install cross
        run: cargo install cross
      - name: Build with cross
        # NDK image override lives in l0/Cross.toml so local dev and CI
        # use the same toolchain.
        working-directory: l0
        run: cross build --release --target aarch64-linux-android
      - name: Verify binary
        run: |
          file l0/target/aarch64-linux-android/release/ybos-l0 | grep "ELF 64-bit LSB" | grep "ARM aarch64"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          find . -name "*.sh" -print0 | xargs -0 shellcheck
