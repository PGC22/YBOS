name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace --features ybos-l0/dev_test_init

  cross_compile_android:
    name: Cross-compile l0 for Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install cross
        run: cargo install cross
      - name: Build with cross
        # NDK image override lives in Cross.toml (root) so local dev and CI
        # use the same toolchain.
        run: cross build -p ybos-l0 --release --target aarch64-linux-android
      - name: Verify binary
        run: |
          file target/aarch64-linux-android/release/ybos-l0 | grep "ELF 64-bit LSB" | grep "ARM aarch64"

  inference_mock:
    name: Build & Test inference (mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run inference tests (mock)
        run: cargo test -p ybos-inference

  inference_llama:
    name: LocalLlama smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang
      - name: Cache test models
        uses: actions/cache@v4
        with:
          path: target/test-models/
          key: ${{ runner.os }}-test-models-tinyllama-v1.0
      - name: Run LocalLlama smoke test
        run: cargo test -p ybos-inference --features local_llama
        timeout-minutes: 20

  memory_mock:
    name: Build & Test memory (mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run memory tests (mock)
        run: cargo test -p ybos-memory

  memory_fastembed:
    name: Memory smoke test (fastembed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache test models
        uses: actions/cache@v4
        with:
          path: target/test-models/
          key: ${{ runner.os }}-test-models-fastembed-v1.0
      - name: Run memory smoke test
        run: cargo test -p ybos-memory --features fastembed,sqlite_vec
        timeout-minutes: 15

  news_smoke:
    name: News Digest smoke (real RSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache test models
        uses: actions/cache@v4
        with:
          path: target/test-models/
          key: ${{ runner.os }}-test-models-fastembed-v1.0
      - name: Run News Digest smoke test
        run: cargo test -p ybos-orchestrator --features real_rss,fastembed,sqlite_vec --test news_e2e -- --include-ignored
        timeout-minutes: 5

  user_context_sqlite:
    name: Build & Test user-context (sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run user-context tests
        run: cargo test -p ybos-user-context --features sqlite
        timeout-minutes: 10

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          find . -name "*.sh" -print0 | xargs -0 shellcheck
