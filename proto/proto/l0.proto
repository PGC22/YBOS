syntax = "proto3";

// YBOS L0 gRPC interface.
// Acest fisier defineste contractul intre L0 (Rust daemon) si L1.

package ybos.l0.v1;

// ─────────────────────────────────────────────────────────────────────────────
// Identity
// ─────────────────────────────────────────────────────────────────────────────

service IdentityService {
  // Returneaza nucleul identitar verificat (HMAC ok pe identity_core.bin).
  // L1 il foloseste pentru injectie in system prompt.
  rpc GetIdentity(GetIdentityRequest) returns (Identity);
}

message GetIdentityRequest {}

message Identity {
  string name                         = 1;
  string uuid                         = 2;
  bytes  biometric_template_public    = 3;
  uint64 created_at                   = 4;  // unix ts
  uint32 version                      = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// Telemetry (server-streaming)
// ─────────────────────────────────────────────────────────────────────────────

service TelemetryService {
  // Stream de citiri hardware. L1 se aboneaza, L0 publica la fiecare tick.
  rpc Subscribe(SubscribeRequest) returns (stream TelemetryFrame);
}

message SubscribeRequest {
  uint32 interval_ms = 1;  // 0 = default L0 (~5000 ms)
}

message TelemetryFrame {
  uint64 timestamp_ms       = 1;
  double cpu_percent        = 2;
  double cpu_temp_pkg_c     = 3;
  double ram_percent        = 4;
  double ram_available_gb   = 5;
  double disk_percent       = 6;
  double disk_free_gb       = 7;
  optional BatteryInfo battery = 8;
  repeated ThermalZone thermal = 9;
}

message BatteryInfo {
  uint32 capacity_percent = 1;
  string status           = 2;  // charging | discharging | full | unknown
  bool   plugged          = 3;
  double power_draw_w     = 4;
}

message ThermalZone {
  string name      = 1;
  double temp_c    = 2;
  bool   throttled = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Reflex actions (L1 cere L0 sa actioneze)
// ─────────────────────────────────────────────────────────────────────────────

service ReflexService {
  rpc RequestAction(ActionRequest) returns (ActionResponse);
}

message ActionRequest {
  oneof action {
    CpuGovernor   set_cpu_governor   = 1;
    BrightnessSet set_brightness     = 2;
    FanCurveSet   set_fan_curve      = 3;
    SuspendCmd    suspend            = 4;
  }
}

message CpuGovernor   { string governor = 1; }  // performance|powersave|ondemand|schedutil
message BrightnessSet { uint32 percent  = 1; }  // 0..100
message FanCurveSet   { repeated FanPoint points = 1; }
message FanPoint      { uint32 temp_c = 1; uint32 fan_percent = 2; }
message SuspendCmd    { uint32 delay_ms = 1; }

message ActionResponse {
  bool   ok    = 1;
  string error = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Session token API (L1 calls L0 to issue tokens for laptops/peers)
// ─────────────────────────────────────────────────────────────────────────────

service SessionService {
  // Request a new session token.
  rpc IssueToken(IssueTokenRequest) returns (IssueTokenResponse);
  // Revoke a specific session.
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  // Revoke all sessions.
  rpc RevokeAll(RevokeAllRequest) returns (RevokeAllResponse);
  // List all active sessions.
  rpc ListActive(ListActiveRequest) returns (ListActiveResponse);
  // DEV-ONLY: Initialize the session API with a master key.
  // Must be gated behind dev_test_init feature in implementation.
  rpc InitializeForTest(InitializeForTestRequest) returns (InitializeForTestResponse);
}

message IssueTokenRequest {
  repeated string capabilities = 1;
  uint64 expiry_secs = 2;
  bytes peer_fingerprint = 3; // 32 bytes
}

message IssueTokenResponse {
  string session_id = 1; // UUID as string
  bytes key_bytes = 2; // 32 bytes
  uint64 expires_at = 3; // unix ts
}

message RevokeSessionRequest {
  string session_id = 1;
}

message RevokeSessionResponse {
  bool revoked = 1;
}

message RevokeAllRequest {}

message RevokeAllResponse {
  uint32 revoked_count = 1;
}

message ListActiveRequest {}

message ListActiveResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string session_id = 1;
  repeated string capabilities = 2;
  uint64 issued_at = 3;
  uint64 expires_at = 4;
  bytes peer_fingerprint = 5;
}

message InitializeForTestRequest {
  bytes master_key = 1; // 32 bytes
}

message InitializeForTestResponse {}
